<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nanobot AI</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222e;
    --border: #2a2a3a;
    --text: #e4e4ef;
    --text-dim: #8888a0;
    --accent: #6c5ce7;
    --accent-glow: #7c6cf7;
    --user-bg: #2d2b55;
    --bot-bg: #1e1e2e;
    --danger: #e74c3c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #fff;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .subtitle { font-size: 12px; color: var(--text-dim); }
  .status {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-dim);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--danger);
    transition: background 0.3s;
  }
  .status-dot.connected { background: #2ecc71; }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 6px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Messages */
  .message {
    display: flex;
    gap: 12px;
    max-width: 85%;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.bot { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .message.user .avatar { background: var(--user-bg); }
  .message.bot .avatar { background: linear-gradient(135deg, var(--accent), #a855f7); }

  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.5;
    font-size: 14px;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .message.user .bubble {
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
  }
  .message.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  /* Code blocks in bot messages */
  .bubble code {
    background: rgba(108, 92, 231, 0.15);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
    font-size: 13px;
  }
  .bubble pre {
    background: #12121a;
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    border: 1px solid var(--border);
  }
  .bubble pre code {
    background: none;
    padding: 0;
    font-size: 12px;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    align-items: center;
  }
  .typing span {
    width: 6px; height: 6px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Welcome */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
    color: var(--text-dim);
    padding: 40px;
    text-align: center;
  }
  .welcome-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
  }
  .welcome h2 { color: var(--text); font-size: 22px; }
  .welcome p { max-width: 400px; line-height: 1.6; }

  /* Input area */
  .input-area {
    padding: 16px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 900px;
    margin: 0 auto;
  }
  .input-row textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 44px;
    line-height: 1.4;
    transition: border-color 0.2s;
  }
  .input-row textarea:focus { border-color: var(--accent); }
  .input-row textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 44px; height: 44px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--accent-glow); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Responsive */
  @media (max-width: 600px) {
    .message { max-width: 95%; }
    .header { padding: 12px 14px; }
    .chat-area { padding: 14px; }
    .input-area { padding: 12px 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">N</div>
    <div>
      <h1>Nanobot AI</h1>
      <div class="subtitle">Lightweight AI Assistant</div>
    </div>
  </div>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">N</div>
    <h2>Welcome to Nanobot</h2>
    <p>Your lightweight AI assistant. Type a message below to start chatting.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Type a message..." disabled></textarea>
    <button class="send-btn" id="sendBtn" disabled title="Send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
(function() {
  const chatArea = document.getElementById('chatArea');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const welcome = document.getElementById('welcome');

  let ws = null;
  let sending = false;
  let typingEl = null;

  // WebSocket on the same host:port (server handles upgrade)
  const loc = window.location;
  const wsProto = loc.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${wsProto}//${loc.host}/ws`;

  function connect() {
    statusText.textContent = 'Connecting...';
    statusDot.classList.remove('connected');

    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      statusDot.classList.add('connected');
      statusText.textContent = 'Connected';
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      removeTyping();

      if (msg.type === 'typing') {
        showTyping();
      } else if (msg.type === 'message') {
        addMessage('bot', msg.text);
        sending = false;
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
      } else if (msg.type === 'error') {
        addMessage('bot', 'Error: ' + msg.text);
        sending = false;
        input.disabled = false;
        sendBtn.disabled = false;
      }
    };

    ws.onclose = () => {
      statusDot.classList.remove('connected');
      statusText.textContent = 'Disconnected';
      input.disabled = true;
      sendBtn.disabled = true;
      // Reconnect after 3s
      setTimeout(connect, 3000);
    };

    ws.onerror = () => {
      ws.close();
    };
  }

  function send() {
    const text = input.value.trim();
    if (!text || sending || !ws || ws.readyState !== WebSocket.OPEN) return;

    if (welcome) welcome.remove();

    addMessage('user', text);
    ws.send(JSON.stringify({ text }));
    input.value = '';
    autoResize();
    sending = true;
    input.disabled = true;
    sendBtn.disabled = true;
    showTyping();
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : 'N';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatMessage(text);

    div.appendChild(avatar);
    div.appendChild(bubble);
    chatArea.appendChild(div);
    scrollToBottom();
  }

  function formatMessage(text) {
    // Simple markdown-like formatting
    let html = escapeHtml(text);

    // Code blocks: ```...```
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

    // Inline code: `...`
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Bold: **...**
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // Italic: *...*
    html = html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');

    // Line breaks
    html = html.replace(/\n/g, '<br>');

    return html;
  }

  function escapeHtml(str) {
    const el = document.createElement('span');
    el.textContent = str;
    return el.innerHTML;
  }

  function showTyping() {
    removeTyping();
    typingEl = document.createElement('div');
    typingEl.className = 'message bot';
    typingEl.id = 'typing';
    typingEl.innerHTML = `
      <div class="avatar">N</div>
      <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
    `;
    chatArea.appendChild(typingEl);
    scrollToBottom();
  }

  function removeTyping() {
    if (typingEl) {
      typingEl.remove();
      typingEl = null;
    }
  }

  function scrollToBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  }

  // Events
  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  input.addEventListener('input', autoResize);

  // Start
  connect();
})();
</script>
</body>
</html>
